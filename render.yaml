services:
  - type: web
    name: bay-pm-jobs
    runtime: python
    plan: starter
    buildCommand: pip3 install -r requirements.txt
    startCommand: BAY_PM_JOBS_HOST=0.0.0.0 BAY_PM_JOBS_DATA_DIR=/var/data BAY_PM_JOBS_AUTO_REFRESH_MINUTES=60 python3 server.py
    disk:
      name: bay-pm-jobs-data
      mountPath: /var/data
      sizeGB: 1
